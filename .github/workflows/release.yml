name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move the floating major version tag
        run: |
          tag="${GITHUB_REF_NAME}"
          major="${tag%%.*}" # e.g. v1.2.3 -> v1

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "$major" "$tag"
          git push origin "$major" --force
