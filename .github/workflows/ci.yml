name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm test

      - name: Rebuild dist/ and check it matches the committed output
        run: |
          npm run build
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff -- dist
            exit 1
          fi
